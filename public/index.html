<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceRoom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #17171a;
    --border: #222226;
    --border2: #2e2e34;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #555560;
    --muted2: #3a3a42;
    --speaking: #e8ff47;
    --danger: #ff4444;
    --deafen: #a855f7;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  /* ─── LANDING ─── */
  #landing {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 3rem;
  }

  .hero {
    text-align: center;
    max-width: 520px;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.04em;
    margin-bottom: 1rem;
  }

  .hero h1 em {
    font-style: normal;
    color: var(--accent);
    display: block;
  }

  .hero p {
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.6;
  }

  .create-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
    width: 100%;
    max-width: 400px;
  }

  .create-box label {
    display: block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .create-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
  }

  .create-box input:focus { border-color: var(--accent); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.85rem 1.5rem;
    cursor: pointer;
    width: 100%;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
  }

  .btn:hover { background: #f5ff70; }
  .btn:active { transform: scale(0.98); }

  /* ─── ROOM ─── */
  #room {
    display: none;
    flex: 1;
    flex-direction: column;
  }

  .room-header {
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .room-id-box {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .room-id-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .room-id-value {
    font-size: 0.85rem;
    color: var(--accent);
    cursor: pointer;
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    transition: border-color 0.2s;
  }
  .room-id-value:hover { border-color: var(--accent); }

  .copy-hint {
    font-size: 0.65rem;
    color: var(--muted);
  }

  .room-body {
    flex: 1;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .section-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  /* Peers grid */
  #peers-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .peer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    min-width: 180px;
    transition: border-color 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.3s ease;
    position: relative;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .peer-card.speaking {
    border-color: var(--speaking);
    box-shadow: 0 0 14px rgba(232, 255, 71, 0.15);
  }

  .peer-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
    position: relative;
  }

  .peer-avatar.me { background: var(--accent); color: #000; }

  .speaking-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    opacity: 0;
    transition: opacity 0.1s;
  }

  .peer-card.speaking .speaking-ring { opacity: 1; animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.7; }
  }

  .peer-info {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    flex: 1;
    min-width: 0;
  }

  .peer-name {
    font-size: 0.82rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .peer-status-icons {
    display: flex;
    gap: 0.3rem;
    font-size: 0.65rem;
    min-height: 0.9rem;
  }

  .icon-muted { color: var(--danger); display: none; }
  .peer-card.peer-muted .icon-muted { display: inline; }

  /* Controls */
  .controls {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    align-items: center;
  }

  .ctrl-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 0.7rem 1.2rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .ctrl-btn:hover { border-color: var(--border2); color: var(--text); }

  /* Active = enabled (mic on / audio on) */
  .ctrl-btn.mic-on {
    border-color: var(--accent);
    color: var(--accent);
  }
  .ctrl-btn.mic-muted {
    border-color: var(--danger);
    color: var(--danger);
  }
  .ctrl-btn.audio-on {
    border-color: var(--border2);
    color: var(--text);
  }
  .ctrl-btn.audio-off {
    border-color: var(--deafen);
    color: var(--deafen);
  }
  .ctrl-btn.deafen-both-on {
    border-color: var(--deafen);
    color: var(--deafen);
  }

  .ctrl-btn.leave { border-color: var(--danger); color: var(--danger); }
  .ctrl-btn.leave:hover { background: rgba(255,68,68,0.1); }

  .controls-separator {
    width: 1px;
    height: 2rem;
    background: var(--border);
  }

  /* Status bar */
  #status-bar {
    padding: 0.5rem 2rem;
    border-top: 1px solid var(--border);
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .status-dot.connected { background: var(--accent); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 0.75rem;
    padding: 0.6rem 1.2rem;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 9998;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Name modal */
  #name-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  #name-modal.open { display: flex; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
    width: 90%;
    max-width: 360px;
    animation: fadeIn 0.25s ease;
  }
  .modal-box h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    margin-bottom: 0.4rem;
  }
  .modal-box p {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 1.25rem;
    line-height: 1.5;
  }
  .modal-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 0.75rem 1rem;
    outline: none;
    margin-bottom: 1rem;
  }
  .modal-box input:focus { border-color: var(--accent); }

  /* Reconnect overlay */
  #reconnect-banner {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(255,68,68,0.12);
    border-bottom: 1px solid var(--danger);
    color: var(--danger);
    font-size: 0.7rem;
    text-align: center;
    padding: 0.4rem;
    z-index: 200;
    letter-spacing: 0.06em;
  }
  #reconnect-banner.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">Voice<span>Room</span></div>
</header>

<div id="reconnect-banner">⟳ RICONNESSIONE IN CORSO…</div>

<!-- LANDING -->
<div id="landing">
  <div class="hero">
    <h1>Parla. <em>Subito.</em></h1>
    <p>Crea una stanza, condividi il link.<br>Nessun account, nessuna app, nessuna attesa.</p>
  </div>
  <div class="create-box">
    <label>Nome stanza (opzionale)</label>
    <input type="text" id="room-input" placeholder="es. progetto-alfa" maxlength="32">
    <button class="btn" onclick="createRoom()">▶ Crea stanza</button>
  </div>
</div>

<!-- ROOM -->
<div id="room" style="display:none;flex:1;flex-direction:column;">
  <div class="room-header">
    <div class="room-id-box">
      <span class="room-id-label">Stanza</span>
      <span class="room-id-value" id="room-id-display" onclick="copyLink()" title="Clicca per copiare il link"></span>
    </div>
    <span class="copy-hint" id="copy-hint">clicca per copiare il link →</span>
  </div>
  <div class="room-body">
    <div>
      <div class="section-label">Partecipanti</div>
      <div id="peers-grid"></div>
    </div>
    <div class="controls">
      <!-- Mic toggle -->
      <button class="ctrl-btn mic-on" id="mic-btn" onclick="toggleMic()" title="Attiva/Disattiva microfono">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm5.3 9a.7.7 0 0 0-.7.7 4.6 4.6 0 0 1-9.2 0 .7.7 0 0 0-1.4 0 6 6 0 0 0 5.3 5.96V18H9a.7.7 0 0 0 0 1.4h6a.7.7 0 0 0 0-1.4h-2.3v-1.34A6 6 0 0 0 18 10.7a.7.7 0 0 0-.7-.7z"/></svg>
        Microfono
      </button>

      <!-- Deafen (mute audio out) -->
      <button class="ctrl-btn audio-on" id="deafen-btn" onclick="toggleDeafen()" title="Attiva/Disattiva audio in uscita">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        Cuffie
      </button>

      <!-- Mute everything shortcut -->
      <button class="ctrl-btn" id="both-btn" onclick="toggleBoth()" title="Silenzia tutto (mic + audio)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        Silenzia tutto
      </button>

      <div class="controls-separator"></div>

      <button class="ctrl-btn leave" onclick="leaveRoom()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5a2 2 0 0 0-2 2v4h2V5h14v14H5v-4H3v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/></svg>
        Esci
      </button>
    </div>
  </div>
  <div id="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connessione...</span>
  </div>
</div>

<!-- NAME MODAL -->
<div id="name-modal">
  <div class="modal-box">
    <h2>Come ti chiami?</h2>
    <p>Il tuo nome sarà visibile agli altri nella stanza. Nessun account richiesto.</p>
    <input type="text" id="name-input" placeholder="Il tuo nome" maxlength="20" autofocus>
    <button class="btn" onclick="confirmName()">Entra nella stanza</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const WS_URL = location.protocol === 'https:'
  ? `wss://${location.host}`
  : `ws://${location.host}`;

const ICE_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'stun:stun3.l.google.com:19302' }
  ]
};

// ─── STATE ────────────────────────────────────────────────
let ws = null;
let localStream = null;
let myPeerId = null;
let myName = '';
let roomId = null;
let isMicMuted = false;
let isDeafened = false;
let peers = {}; // peerId → { pc, name, card }
let pendingJoinRoom = null;
let isReconnecting = false;

// ─── UTILS ────────────────────────────────────────────────
function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function setStatus(text, connected = false) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').className = 'status-dot' + (connected ? ' connected' : '');
}

// ─── LANDING ──────────────────────────────────────────────
window.onload = () => {
  const params = new URLSearchParams(location.search);
  const roomParam = params.get('room');
  if (roomParam) {
    pendingJoinRoom = roomParam;
    openNameModal();
  }
  document.getElementById('room-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') createRoom();
  });
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmName();
  });
};

function createRoom() {
  let id = document.getElementById('room-input').value.trim();
  if (!id) id = uid();
  id = id.toLowerCase().replace(/[^a-z0-9-]/g, '-');
  pendingJoinRoom = id;
  openNameModal();
}

function openNameModal() {
  document.getElementById('name-modal').classList.add('open');
  setTimeout(() => document.getElementById('name-input').focus(), 50);
}

async function confirmName() {
  const nameVal = document.getElementById('name-input').value.trim();
  if (!nameVal) { showToast('Inserisci il tuo nome'); return; }
  myName = nameVal;
  document.getElementById('name-modal').classList.remove('open');
  await joinRoom(pendingJoinRoom);
}

// ─── ROOM ─────────────────────────────────────────────────
async function joinRoom(id) {
  roomId = id;
  myPeerId = uid();

  document.getElementById('landing').style.display = 'none';
  const roomEl = document.getElementById('room');
  roomEl.style.display = 'flex';
  document.getElementById('room-id-display').textContent = id;
  history.replaceState({}, '', `?room=${id}`);

  setStatus('Richiesta microfono…');

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (err) {
    setStatus('Microfono non disponibile: ' + err.message);
    showToast('⚠ Impossibile accedere al microfono');
    return;
  }

  addPeerCard('__me__', myName + ' (tu)', true);
  setupSpeakingDetection('__me__', localStream);
  connectWS();
}

function connectWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  setStatus('Connessione al server…');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus('Nella stanza', true);
    document.getElementById('reconnect-banner').classList.remove('show');
    isReconnecting = false;
    ws.send(JSON.stringify({ type: 'join', roomId, peerId: myPeerId, name: myName }));
  };

  ws.onmessage = async (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    switch (msg.type) {
      case 'peers':
        // msg.peers is array of { peerId, name }
        for (const p of msg.peers) {
          await createOffer(p.peerId, p.name);
        }
        break;
      case 'peer-joined':
        // They will send us an offer; just register name now
        if (msg.peerId && msg.name) {
          // Store name so it's ready when offer arrives
          if (!peers[msg.peerId]) {
            peers[msg.peerId] = { pc: null, card: null, name: msg.name };
          } else {
            peers[msg.peerId].name = msg.name;
          }
        }
        showToast(`${msg.name || 'Qualcuno'} è entrato`);
        break;
      case 'peer-left':
        removePeer(msg.peerId);
        break;
      case 'offer':
        await handleOffer(msg);
        break;
      case 'answer':
        await handleAnswer(msg);
        break;
      case 'ice-candidate':
        await handleIce(msg);
        break;
      case 'peer-mute-state':
        updatePeerMuteState(msg.peerId, msg.muted);
        break;
    }
  };

  ws.onclose = () => {
    if (!roomId) return; // intentionally left
    setStatus('Disconnesso — riconnessione…');
    document.getElementById('reconnect-banner').classList.add('show');
    if (!isReconnecting) {
      isReconnecting = true;
      setTimeout(() => { if (roomId) connectWS(); }, 2000);
    }
  };

  ws.onerror = () => setStatus('Errore connessione');
}

// ─── PEER CARDS ───────────────────────────────────────────
function addPeerCard(peerId, name, isMe = false) {
  const grid = document.getElementById('peers-grid');
  if (document.getElementById('card-' + peerId)) return document.getElementById('card-' + peerId);
  const card = document.createElement('div');
  card.className = 'peer-card' + (isMe ? ' me' : '');
  card.id = 'card-' + peerId;
  const initial = (name[0] || '?').toUpperCase();
  const displayName = isMe ? name : (name || peerId.slice(0, 6));
  card.innerHTML = `
    <div class="peer-avatar ${isMe ? 'me' : ''}">
      ${initial}
      <div class="speaking-ring"></div>
    </div>
    <div class="peer-info">
      <span class="peer-name">${displayName}</span>
      <div class="peer-status-icons">
        <span class="icon-muted" title="Microfono disattivato">🔇</span>
      </div>
    </div>
  `;
  grid.appendChild(card);
  return card;
}

function removePeer(peerId) {
  const peer = peers[peerId];
  if (peer) {
    if (peer.pc) peer.pc.close();
    const card = document.getElementById('card-' + peerId);
    if (card) card.remove();
    const audio = document.getElementById('audio-' + peerId);
    if (audio) audio.remove();
    delete peers[peerId];
  }
  showToast('Un partecipante ha lasciato la stanza');
}

function setSpeaking(peerId, speaking) {
  const card = document.getElementById('card-' + peerId);
  if (card) card.classList.toggle('speaking', speaking);
}

function updatePeerMuteState(peerId, muted) {
  const card = document.getElementById('card-' + peerId);
  if (card) card.classList.toggle('peer-muted', muted);
}

function setupSpeakingDetection(peerId, stream) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const src = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 512;
    src.connect(analyser);
    const buf = new Uint8Array(analyser.frequencyBinCount);
    let speaking = false;
    const interval = setInterval(() => {
      // Stop if stream ended
      if (!stream.active) { clearInterval(interval); ctx.close(); return; }
      analyser.getByteFrequencyData(buf);
      const avg = buf.reduce((a, b) => a + b, 0) / buf.length;
      const isSpeaking = avg > 8;
      if (isSpeaking !== speaking) {
        speaking = isSpeaking;
        setSpeaking(peerId, speaking);
      }
    }, 80);
  } catch (e) {
    console.warn('Speaking detection failed:', e);
  }
}

// ─── WEBRTC ───────────────────────────────────────────────
function createPeerConnection(peerId, knownName) {
  // Avoid duplicate connections
  if (peers[peerId]?.pc) return peers[peerId].pc;

  const pc = new RTCPeerConnection(ICE_CONFIG);

  // Add all local tracks
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.onicecandidate = ({ candidate }) => {
    if (candidate && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'ice-candidate', targetId: peerId, candidate }));
    }
  };

  pc.ontrack = ({ streams }) => {
    const stream = streams[0];
    if (!stream) return;

    let audio = document.getElementById('audio-' + peerId);
    if (!audio) {
      audio = new Audio();
      audio.id = 'audio-' + peerId;
      audio.autoplay = true;
      document.body.appendChild(audio);
    }
    audio.srcObject = stream;

    // Apply current deafen state
    audio.muted = isDeafened;

    setupSpeakingDetection(peerId, stream);
  };

  pc.onconnectionstatechange = () => {
    const state = pc.connectionState;
    console.log(`[${peerId}] connection state: ${state}`);
    if (state === 'failed') {
      // Try ICE restart
      if (peers[peerId]?.isOfferer) {
        pc.restartIce();
        pc.createOffer({ iceRestart: true }).then(offer => {
          return pc.setLocalDescription(offer);
        }).then(() => {
          ws.send(JSON.stringify({ type: 'offer', targetId: peerId, sdp: pc.localDescription }));
        }).catch(console.error);
      }
    }
  };

  const name = knownName || peers[peerId]?.name || peerId.slice(0, 6);

  if (!peers[peerId]) {
    peers[peerId] = { pc, card: null, name };
  } else {
    peers[peerId].pc = pc;
    peers[peerId].name = peers[peerId].name || name;
  }

  const finalName = peers[peerId].name || name;
  const card = addPeerCard(peerId, finalName);
  peers[peerId].card = card;

  return pc;
}

async function createOffer(peerId, knownName) {
  const pc = createPeerConnection(peerId, knownName);
  peers[peerId].isOfferer = true;
  try {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: 'offer', targetId: peerId, sdp: pc.localDescription }));
  } catch (e) {
    console.error('createOffer error:', e);
  }
}

async function handleOffer(msg) {
  const peerId = msg.fromId;
  const pc = createPeerConnection(peerId);
  peers[peerId].isOfferer = false;
  try {
    await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    ws.send(JSON.stringify({ type: 'answer', targetId: peerId, sdp: pc.localDescription }));
  } catch (e) {
    console.error('handleOffer error:', e);
  }
}

async function handleAnswer(msg) {
  const pc = peers[msg.fromId]?.pc;
  if (!pc) return;
  try {
    if (pc.signalingState === 'have-local-offer') {
      await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
    }
  } catch (e) {
    console.error('handleAnswer error:', e);
  }
}

async function handleIce(msg) {
  const pc = peers[msg.fromId]?.pc;
  if (!pc) return;
  try {
    if (msg.candidate) {
      await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
    }
  } catch (e) {
    // Benign — ICE race condition
  }
}

// ─── CONTROLS ─────────────────────────────────────────────
function toggleMic() {
  isMicMuted = !isMicMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMicMuted);

  const btn = document.getElementById('mic-btn');
  if (isMicMuted) {
    btn.className = 'ctrl-btn mic-muted';
    btn.innerHTML = btn.innerHTML.replace('Microfono', 'Muto');
  } else {
    btn.className = 'ctrl-btn mic-on';
    btn.innerHTML = btn.innerHTML.replace('Muto', 'Microfono');
  }

  const meCard = document.getElementById('card-__me__');
  if (meCard) meCard.classList.toggle('peer-muted', isMicMuted);

  // Notify peers
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'mute-state', muted: isMicMuted }));
  }

  showToast(isMicMuted ? '🔇 Microfono disattivato' : '🎙 Microfono attivo');
  updateBothButton();
}

function toggleDeafen() {
  isDeafened = !isDeafened;
  applyDeafen();
  showToast(isDeafened ? '🔕 Audio disattivato' : '🔊 Audio attivo');
  updateBothButton();
}

function toggleBoth() {
  const bothActive = isMicMuted && isDeafened;
  if (bothActive) {
    // Re-enable everything
    isMicMuted = false;
    isDeafened = false;
  } else {
    // Mute everything
    isMicMuted = true;
    isDeafened = true;
  }

  localStream.getAudioTracks().forEach(t => t.enabled = !isMicMuted);
  applyDeafen();

  const meCard = document.getElementById('card-__me__');
  if (meCard) meCard.classList.toggle('peer-muted', isMicMuted);

  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'mute-state', muted: isMicMuted }));
  }

  // Update mic button
  const micBtn = document.getElementById('mic-btn');
  if (isMicMuted) {
    micBtn.className = 'ctrl-btn mic-muted';
    micBtn.querySelector('svg').nextSibling && (micBtn.lastChild.textContent = 'Muto');
  } else {
    micBtn.className = 'ctrl-btn mic-on';
  }

  updateBothButton();
  showToast(bothActive ? '🔊 Audio ripristinato' : '🔇 Tutto silenziato');
}

function applyDeafen() {
  // Mute/unmute all remote audio elements
  document.querySelectorAll('audio[id^="audio-"]').forEach(a => {
    a.muted = isDeafened;
  });

  const btn = document.getElementById('deafen-btn');
  if (isDeafened) {
    btn.className = 'ctrl-btn audio-off';
  } else {
    btn.className = 'ctrl-btn audio-on';
  }
}

function updateBothButton() {
  const btn = document.getElementById('both-btn');
  const bothActive = isMicMuted && isDeafened;
  btn.className = bothActive ? 'ctrl-btn deafen-both-on' : 'ctrl-btn';
}

function leaveRoom() {
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  localStream?.getTracks().forEach(t => t.stop());
  localStream = null;

  Object.values(peers).forEach(p => {
    if (p.pc) p.pc.close();
  });
  peers = {};

  document.querySelectorAll('audio[id^="audio-"]').forEach(a => a.remove());

  roomId = null;
  isMicMuted = false;
  isDeafened = false;

  // Reset buttons
  document.getElementById('mic-btn').className = 'ctrl-btn mic-on';
  document.getElementById('deafen-btn').className = 'ctrl-btn audio-on';
  document.getElementById('both-btn').className = 'ctrl-btn';

  document.getElementById('room').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
  document.getElementById('peers-grid').innerHTML = '';
  document.getElementById('reconnect-banner').classList.remove('show');
  history.replaceState({}, '', '/');
}

function copyLink() {
  const url = location.href;
  navigator.clipboard.writeText(url).then(() => {
    showToast('✓ Link copiato!');
    document.getElementById('copy-hint').textContent = '✓ copiato!';
    setTimeout(() => {
      document.getElementById('copy-hint').textContent = 'clicca per copiare il link →';
    }, 2000);
  });
}

// ─── KEYBOARD SHORTCUTS ───────────────────────────────────
document.addEventListener('keydown', e => {
  if (!roomId) return;
  // M = toggle mic
  if (e.key === 'm' || e.key === 'M') {
    if (e.target.tagName !== 'INPUT') toggleMic();
  }
  // D = toggle deafen
  if (e.key === 'd' || e.key === 'D') {
    if (e.target.tagName !== 'INPUT') toggleDeafen();
  }
});
</script>
